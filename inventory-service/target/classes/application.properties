spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${env.MYSQL_HOST}/${env.MYSQL_DATABASE}
spring.datasource.username=${env.MYSQL_USER}
spring.datasource.password=${env.MYSQL_PASSWORD}
spring.jpa.hibernate.ddl-auto=create-drop
# run instances on random free ports in your machine
server.port=0
eureka.client.serviceUrl.defaultZone=${env.EUREKA_SERVER_URL}
spring.application.name=inventory-service
spring.zipkin.base-url=${env.ZIPKIN_URL}
spring.sleuth.sampler.probability= 1.0