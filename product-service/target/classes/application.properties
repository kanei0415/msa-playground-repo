spring.data.mongodb.database=${MONGO_DATABASE}
spring.data.mongodb.uri=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_HOST}
# name to be used on eureka client
spring.application.name=product-service
# Set to 0 to make random selection as api gateway uses 8080 automatically
server.port=0

spring.zipkin.base-url=${ZIPKIN_URL}
spring.sleuth.sampler.probability= 1.0