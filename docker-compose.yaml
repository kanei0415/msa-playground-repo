version: '3.8'

services:
  kafka:
    image: docker.io/apache/kafka:4.2.0
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      CLUSTER_ID: '5L6g3nShT-eMCtK--X86sw'
  
  zipkin:
    image: docker.io/openzipkin/zipkin:3.6.1
    container_name: zipkin
    ports:
      - "9411:9411"

  discovery-server:
    image: localhost/local/discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      - EUREKA_SERVER_URL=http://localhost:8761/eureka
      - ZIPKIN_URL=http://localhost:9411
      - SERVER_PORT=8761
    depends_on:
      - zipkin
  
  api-gateway:
    image: localhost/local/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_SERVER_URL=http://localhost:8761/eureka
      - EUREKA_SERVER_HOST=http://localhost:8761
      - ZIPKIN_URL=http://localhost:9411
      - SERVER_PORT=8080
    depends_on:
      - discovery-server
      - zipkin
  
  product-service:
    image: localhost/local/product-service
    container_name: product-service
    environment:
      - ZIPKIN_URL=http://localhost:9411
      - MONGO_DATABASE=productdb
      - MONGO_USER=username
      - MONGO_PASSWORD=password
      - MONGO_HOST=localhost:27017
    depends_on:
      - mongo
      - zipkin
  mongo:
    image: docker.io/library/mongo:8.2.7
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: username
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: productdb

  order-service:
    image: localhost/local/order-service
    container_name: order-service
    ports:
      - "8081:8081"
    environment:
      - ZIPKIN_URL=http://localhost:9411
      - EUREKA_SERVER_URL=http://localhost:8761/eureka
      - KAFKA_BOOTSTRAP_SERVERS=localhost:9092
      - SERVER_PORT=8081
      - MYSQL_DATABASE=order-service
      - MYSQL_USER=username
      - MYSQL_PASSWORD=password
      - MYSQL_HOST=localhost:3306
    depends_on:
      - order-mysql
      - discovery-server
      - kafka
      - zipkin
      
  order-mysql:
    image: docker.io/library/mysql:9.7.0
    container_name: order-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: order-service
      MYSQL_USER: username
      MYSQL_PASSWORD: password

  notification-service:
    image: localhost/local/notification-service
    container_name: notification-service
    environment:
      - ZIPKIN_URL=http://localhost:9411
      - EUREKA_SERVER_URL=http://eureka:password@localhost:8761/eureka
      - KAFKA_BOOTSTRAP_SERVERS=localhost:9092
    depends_on:
      - discovery-server
      - kafka
      - zipkin
  
  inventory-service:
    image: localhost/local/inventory-service
    container_name: inventory-service
    environment:
      - ZIPKIN_URL=http://localhost:9411
      - EUREKA_SERVER_URL=http://localhost:8761/eureka
      - KAFKA_BOOTSTRAP_SERVERS=localhost:9092
      - MYSQL_DATABASE=inventory-service
      - MYSQL_USER=username
      - MYSQL_PASSWORD=password
      - MYSQL_HOST=localhost:3307
    depends_on:
      - inventory-mysql
      - discovery-server
      - kafka
      - zipkin
  
  inventory-mysql:
    image: docker.io/library/mysql:9.7.0
    container_name: inventory-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: inventory-service
      MYSQL_USER: username
      MYSQL_PASSWORD: password
