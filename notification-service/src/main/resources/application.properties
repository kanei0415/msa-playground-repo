eureka.client.serviceUrl.defaultZone=${env.EUREKA_SERVER_URL}
spring.application.name=notification-service
server.port=0

spring.sleuth.integration.enabled=true
spring.zipkin.base-url=${env.ZIPKIN_URL}
spring.sleuth.sampler.probability=1

# Kafka Properties
spring.kafka.bootstrap-servers=${env.KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.template.default-topic=notificationTopic
spring.kafka.consumer.group-id= notificationId
spring.kafka.consumer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=event:com.programming.techie.OrderPlacedEvent